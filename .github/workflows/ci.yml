name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Display Foundry version
        run: forge --version

      - name: Install dependencies
        run: forge install

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build

      - name: Run tests
        run: forge test -vvv

      - name: Run fuzz tests (reduced runs for CI)
        run: forge test --fuzz-runs 200 --match-path "test/fuzz/*" -vvv

      - name: Run integration tests
        run: forge test --match-path "test/integration/*" -vvv

      - name: Run edge case tests
        run: forge test --match-path "test/edge/*" -vvv

      - name: Gas report
        run: forge test --gas-report > gas-report.txt

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: gas-report.txt
